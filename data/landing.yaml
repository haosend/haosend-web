# Note: Template blocks require a 'weight' parameter so they're correctly ordered on the landing page

# Hero
hero:
  enable: true
  weight: 10
  template: hero

  backgroundImage:
    path: "images/templates/hero"
    filename:
      desktop: "gradient-desktop.webp"
      mobile: "gradient-mobile.webp"

  badge:
    text: v0.1.0
    color: primary # primary, secondary, success, danger, warning, info, light, dark
    pill: false # boolean
    soft: true # boolean

  # titleLogo:
  #   path: "images/logos"
  #   filename: "title_logo.png"
  #   alt: "Lotus Docs Logo"
  #   height: 80px

  title: "Haosend 个人博客"
  subtitle: 通信工程师, **OTN**,**PTN**, **IT**, and **CT** 技术文档.

  image:
    path: "images" # path to image under configured assets directory. default 'images'
    filename: "lotus_docs_screenshot.png" # filename of your hero image (including file extension)
    alt: "Lotus Docs Screenshot" # Optional but recommended
    boxShadow: true # default 'false' (excludes .svg images)
    rounded: true # round the image corners? default 'false' (excludes .svg images)

  ctaButton:
    icon: rocket_launch
    btnText: "开始浏览"
    url: "/docs/quickstart/#create-a-new-lotus-docs-site"
  cta2Button:
    icon: code
    btnText: "本站源码"
    url: "https://github.com/haosend/haosend-web"

  info: "**Open Source** MIT Licensed."

# Feature Grid
featureGrid:
  enable: true
  weight: 20
  template: feature grid

  title: 在这里能看到什么?
  subtitle: 通信技术行业基于个人的分析，就业指导，技术分享，个人兴趣分享等等。

  items:
    - title: 技术分享
      icon: speed
      description: 个人工作中的技术分享及各种学习心得，以及各大家非保密资料文档分享

    - title: 就业指导
      icon: trending_up
      description: 本人非大厂工作，但会基于自己十余年的见闻经历，给出自己的见解。

    - title: IT技术
      icon: devices 
      description: 个人对IT技术的理解，以及对未来技术的展望。

    - title: 读书笔记
      icon: book
      description: 书山有路勤为径，学海无涯苦作舟，个人读书笔记，以及对书籍的一些感悟。

    - title: 电影音乐
      icon: movie
      description: 个人对电影音乐的一些感悟，以及对一些经典电影的解读。

    - title: OTN光传输
      icon: lightbulb
      description: 个人最擅长领域，基于自己多年工作经验，分享个人对OTN光传输的理解，以及对未来光传输的展望。

    - title: PTN分组传送网  
      icon: router
      description: 个人较擅长领域，基于自己多年工作经验，分享对PTN分组传送网的理解，以及对未来PTN的展望。

    - title: 数据通信 
      icon: computer
      description: 个人兴趣，稍有涉及与学习，分享基于个人对数据通信的理解，以及对未来数据通信的展望。

    - title: 其他
      icon: more
      description: 个人兴趣，分享个人对其他领域的理解，以及对未来的展望。
