[build]
  publish = "haosend-web/public"
  command = "cd exampleSite && hugo --gc --minify --themesDir ../.. -b ${DEPLOY_PRIME_URL}"


  [build.environment]
    HUGO_VERSION = "0.145.0"

[context.production.environment]
  HUGO_ENV           = "production"
  HUGO_ENABLEGITINFO = "true"


[context.next.environment]
  HUGO_ENABLEGITINFO = "true"